<!-- ArcGIS API for JavaScript -->
<link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
<script src="https://js.arcgis.com/4.25/"></script>

<!-- Initialize the ArcGIS API for JavaScript -->
<script>
  require([
    "esri/config",
    "esri/Map",
    "esri/views/MapView",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Expand"
  ], function(esriConfig, Map, MapView, BasemapGallery, Expand) {
    // Map implementation code 
    esriConfig.apiKey = "AAPTaXW4BVW_ro3UyCh2wpLtbsw..S4T9V5K_hlh_60RGW9t_q7htVqq7iscsvxjm7dd1G8h2i2HUDFCe1l-xBCMaummjmRdIHDLSbsD8DI04VAG9NpUw0YA_nIOccQtabmzOOAcTL6hKl7cTkLMIlXQgwoVMZJbFA3l6_6KFWsMeGQQJCIydC6G0tbHy3E12vEZknZ7DtoweCnBZa-zK4eZnLJPEOQ6f-5q6gQv_sdJZgPHH1FcV0esU1rH-iaopU2P7UXhTG_o68RTsAtcuGj1TIC8dZNJu8W8ieWk.AT1_5tp0GXlO";
  // Create the Map instance
const map = new Map({
  basemap: "arcgis-streets" // Map service style
});

// Create the MapView container rendering our map
const view = new MapView({
  map: map,
  center: [-87.8131, 42.5811], // Longitude, latitude format
  zoom: 14, // Zoom scale level
  container: "viewDiv" // ID of our body div
});

// Add a basemap gallery widget to the view
let basemapGallery = new BasemapGallery({
  view: view
});
// Add widget to the top right corner of the view
view.ui.add(basemapGallery, {
  position: "top-right"
});

});
</script>

<!-- CSS to make the map fullscreen -->
<style>
  html, 
  body, 
  #viewDiv {
    padding: 0;
    margin: 0;
    height: 100%;
    width: 100%;
  }
</style>

</head>
<body>

<!-- Create a zoom element for the ArcGIS API for JavaScript map view -->
<div id="viewDiv"></div>

<!-- Create a basemap gallery zoomelement for the ArcGIS API for JavaScript map view -->
<div id="basemapGalleryDiv"></div>
</body>
